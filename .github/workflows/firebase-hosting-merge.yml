# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20  # ✅ Ažurirano na Node.js 20+

      - name: Install dependencies
        run: npm install  # ✅ Osigurava da su sve zavisnosti instalirane

      - name: Install Firebase CLI
        run: npm install -g firebase-tools  # ✅ Instalira Firebase CLI

      - name: Build project
        run: npm run build  # ✅ Build-uje aplikaciju pre deploy-a

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}  # ✅ Koristi Firebase token za autentifikaciju
